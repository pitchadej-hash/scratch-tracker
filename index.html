<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แอปพลิเคชันช่วยเหลือผู้ป่วย (บันทึกยา & ตรวจจับเสียง)</title>
<style>
/* 🎨 1. ระบบธีมสี (สลับสับเปลี่ยนได้หลายสี) */
:root {
--primary: #3498db; /* สีฟ้าหลัก */
--bg: #f5f7fa; /* สีพื้นหลัง */
--card-bg: #ffffff; /* สีกล่องข้อความ */
--text: #2c3e50; /* สีตัวอักษร */
}

.theme-pink {
--primary: #fd79a8;
--bg: #ffeaa7;
}

.theme-green {
--primary: #2ed573;
--bg: #e8f8f5;
}

.theme-dark {
--primary: #ff7f50;
--bg: #2f3542;
--card-bg: #3f4451;
--text: #ffffff;
}

/* 🖼️ 2. จัดแต่งหน้าตาแอปพลิเคชัน (UI) */
body {
font-family: 'Helvetica Neue', Arial, sans-serif;
background-color: var(--bg);
color: var(--text);
margin: 0;
padding: 20px;
transition: all 0.4s ease;
}

.app-container {
max-width: 600px;
margin: 0 auto;
}

.main-header {
text-align: center;
color: var(--primary);
margin-bottom: 25px;
}

.card {
background-color: var(--card-bg);
border-radius: 16px;
padding: 24px;
margin-bottom: 20px;
box-shadow: 0 10px 20px rgba(0,0,0,0.05);
}

h3 { margin-top: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }

/* 🔘 โซนปุ่มเลือกธีมสี */
.theme-box {
display: flex;
gap: 12px;
justify-content: center;
margin-bottom: 10px;
}
.color-dot {
width: 35px;
height: 35px;
border-radius: 50%;
cursor: pointer;
border: 3px solid white;
box-shadow: 0 4px 6px rgba(0,0,0,0.1);
transition: transform 0.2s;
}
.color-dot:hover { transform: scale(1.15); }

/* 💊 โซนฟอร์มกรอกยา */
.input-group {
display: flex;
flex-direction: column;
gap: 10px;
}
input[type="text"], input[type="time"] {
padding: 12px;
border: 2px solid #e2e8f0;
border-radius: 8px;
font-size: 1rem;
outline: none;
}
input:focus { border-color: var(--primary); }

button.btn-primary {
background-color: var(--primary);
color: white;
border: none;
padding: 12px;
border-radius: 8px;
font-size: 1rem;
font-weight: bold;
cursor: pointer;
transition: opacity 0.2s;
}
button.btn-primary:hover { opacity: 0.9; }

.med-list { list-style: none; padding: 0; margin-top: 15px; }
.med-item {
display: flex;
justify-content: space-between;
align-items: center;
padding: 12px;
background: rgba(0,0,0,0.03);
border-left: 4px solid var(--primary);
margin-bottom: 8px;
border-radius: 4px;
}

/* 🎙️ โซน AI ตรวจจับเสียง */
.ai-status {
text-align: center;
padding: 15px;
background: rgba(0,0,0,0.02);
border-radius: 8px;
font-size: 1.1rem;
font-weight: bold;
margin-top: 15px;
}
</style>
</head>
<body>

<div class="app-container">

<h1 class="main-header">✨แอปพลิเคชันดูแลสุขภาพประจำวัน</h1>

<!-- 🎨 ส่วนที่ 1: เลือกธีมสีแอป -->
<div class="card" style="text-align: center;">
<h3>🎨 เลือกสีที่คุณชอบ</h3>
<div class="theme-box">
<div class="color-dot" style="background: #3498db;" onclick="setTheme('blue')"></div>
<div class="color-dot" style="background: #fd79a8;" onclick="setTheme('pink')"></div>
<div class="color-dot" style="background: #2ed573;" onclick="setTheme('green')"></div>
<div class="color-dot" style="background: #2f3542;" onclick="setTheme('dark')"></div>
</div>
</div>

<!-- 💊 ส่วนที่ 2: บันทึกยาประจำวัน -->
<div class="card">
<h3>💊 บันทึกการทานยาประจำวัน</h3>
<div class="input-group">
<input type="text" id="pillName" placeholder="กรอกชื่อยา (เช่น ยาพารา, ยาแก้แพ้)">
<input type="time" id="pillTime">
<button class="btn-primary" onclick="savePill()">+ บันทึกรายการยา</button>
</div>
<ul id="pillList" class="med-list">
<!-- รายการยาที่กดบันทึกจะแสดงตรงนี้ -->
</ul>
</div>

<!-- 🎙️ ส่วนที่ 3: เปิดฟังเสียงจาก AI (Teachable Machine) -->
<div class="card">
<h3>🎙️ ตรวจสอบเสียงรบกวน / เสียงเกา</h3>
<button class="btn-primary" style="width: 100%;" onclick="startAI()">เริ่มระบบตรวจจับเสียง</button>
<div id="ai-result" class="ai-status">🔇 ระบบปิดอยู่ (กดปุ่มด้านบนเพื่อเริ่มฟังเสียง)</div>
</div>

</div>

<!-- โหลดเครื่องมือสำหรับเล่นโมเดลเสียงของ Google -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@0.4.0/dist/speech-commands.min.js"></script>

<script>
// 🔗 ⚠️ สำคัญมาก: เอาลิงก์แชร์โมเดลจาก Teachable Machine ของคุณมาแปะทับตรงนี้นะครับ
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/https://teachablemachine.withgoogle.com/models/FcU8wUc4G/";

// --- 🎨 ฟังก์ชันเปลี่ยนสีธีม ---
function setTheme(colorName) {
document.body.className = ''; // ล้างธีมเก่า
if(colorName !== 'blue') {
document.body.classList.add('theme-' + colorName);
}
}

// --- 💊 ฟังก์ชันบันทึกข้อมูลยา ---
function savePill() {
const name = document.getElementById('pillName').value;
const time = document.getElementById('pillTime').value;

if(!name || !time) {
alert('กรุณากรอกข้อมูลยาและระบุเวลาให้ครบถ้วนก่อนนะคะ 😊');
return;
}

const ul = document.getElementById('pillList');
const li = document.createElement('li');
li.className = 'med-item';
li.innerHTML = `
<span>⏰ <b>${time} น.</b> - ${name}</span>
<button onclick="this.parentElement.remove()" style="background:#ff4757; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">ลบ</button>
`;
ul.appendChild(li);

// ล้างกล่องอินพุตหลังพิมพ์เสร็จ
document.getElementById('pillName').value = '';
document.getElementById('pillTime').value = '';
}

// --- 🎙️ ฟังก์ชันควบคุมไมโครโฟน AI ---
async function startAI() {
const statusDiv = document.getElementById('ai-result');
statusDiv.innerHTML = "🔄 กำลังเปิดระบบและโหลดโมเดลเสียง...";

try {
const checkpointURL = MODEL_URL + "model.json";
const metadataURL = MODEL_URL + "metadata.json";

const recognizer = speechCommands.create(
"BROWSER_FFT",
undefined,
checkpointURL,
metadataURL
);

await recognizer.ensureModelLoaded();
const labels = recognizer.wordLabels();

statusDiv.innerHTML = "🎧 AI กำลังฟังเสียงรอบตัวคุณแล้ว...";

recognizer.listen(result => {
const scores = result.scores;
let maxScore = 0;
let currentMatch = "";

// ตรวจหาเสียงที่คะแนนความมั่นใจสูงสุด
for (let i = 0; i < labels.length; i++) {
if (scores[i] > maxScore) {
maxScore = scores[i];
currentMatch = labels[i];
}
}

// แสดงผลอัปเดตหน้าแอปพลิเคชัน
statusDiv.innerHTML = `📢 ตรวจพบเสียง: <span style="color:var(--primary); font-size:1.3rem;">${currentMatch}</span> (${(maxScore * 100).toFixed(0)}%)`;
}, {
includeSpectrogram: true,
probabilityThreshold: 0.75,
invokeCallbackOnNoiseAndUnknown: true,
overlapFactor: 0.50
});

} catch (error) {
console.error(error);
statusDiv.innerHTML = "❌ ไม่สามารถรันโมเดลได้ (อย่าลืมตรวจเช็คลิงก์ MODEL_URL ในโค้ดนะครับ)";
}
}
</script>

</body>
</html>
